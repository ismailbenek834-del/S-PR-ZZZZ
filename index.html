<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Sürprizim Var!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; overflow: hidden; }
        #game-container { text-align: center; padding: 20px; }
        .boxes { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .gift { font-size: 70px; cursor: pointer; transition: 0.3s; }
        .gift:hover { transform: scale(1.2); }
        #message-area { display: none; margin-top: 20px; animation: fadeIn 1.5s; }
        .poem { font-style: italic; color: #ff9999; font-size: 18px; line-height: 1.6; }
        .note { font-size: 24px; font-weight: bold; margin-top: 15px; }
        #hint { color: #888; margin-bottom: 10px; font-size: 14px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="setup">
            <h2>Senin için bir sürprizim var!</h2>
            <p id="hint">Doğru kutuyu bulman lazım... Seç bakalım:</p>
            <div class="boxes">
                <div class="gift" onclick="wrong(this)">🎁</div>
                <div class="gift" onclick="correct()">🎁</div>
                <div class="gift" onclick="wrong(this)">🎁</div>
            </div>
        </div>
        <div id="message-area">
            <div class="poem">
                "Gözlerin gökyüzü, gülüşün bahar,<br>
                Seninle her anın ayrı bir tadı var.<br>
                İyi ki varsın, iyi ki yanımdasın,<br>
                Kalbimin en güzel köşesindesin."
            </div>
            <div class="note">Seni çok seviyorum bitanem! ❤️</div>
        </div>
    </div>
    <script>
        function wrong(element) {
            element.style.opacity = "0.3";
            element.onclick = null;
            alert("Bu kutu boş çıktı! Diğerlerini dene hayatım :)");
        }
        function correct() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('message-area').style.display = 'block';
            document.body.style.background = '#2c001e';
            var end = Date.now() + (7 * 1000);
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff0000', '#ffffff'] });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff0000', '#ffffff'] });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }
    </script>
</body>
</html>
